<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter | Tools Wonder</title>
    <style>
        :root {
            --primary-blue: #0077ff;
            --light-blue: #e6f2ff;
            --dark-blue: #0055cc;
            --white: #ffffff;
            --light-gray: #f8f9fa;
            --dark-gray: #333333;
            --border-radius: 8px;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: var(--white);
            color: var(--dark-gray);
            line-height: 1.6;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        h1 {
            color: var(--primary-blue);
            font-size: 2.3rem;
            margin-bottom: 15px;
            position: relative;
            display: inline-block;
        }
        
        h1::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background-color: var(--primary-blue);
            border-radius: 2px;
        }
        
        .header-description {
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
            color: #555;
        }
        
        .tool-card {
            background-color: var(--white);
            border-radius: var(--border-radius);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            padding: 30px;
            border-top: 4px solid var(--primary-blue);
            margin-bottom: 30px;
        }
        
        .converter-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .control-group {
            flex: 1;
            min-width: 200px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark-gray);
        }
        
        .select-field, .input-field {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: var(--border-radius);
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .select-field {
            background-color: var(--white);
            cursor: pointer;
        }
        
        .input-field:focus, .select-field:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(0, 119, 255, 0.1);
        }
        
        .results-container {
            margin-top: 30px;
        }
        
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .result-card {
            background-color: var(--light-gray);
            border-radius: var(--border-radius);
            padding: 15px;
            border-left: 3px solid var(--primary-blue);
        }
        
        .result-value {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--primary-blue);
            margin-bottom: 5px;
        }
        
        .result-unit {
            font-size: 0.9rem;
            color: #666;
        }
        
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 30px;
        }
        
        .btn {
            display: inline-block;
            padding: 12px 25px;
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            border: none;
        }
        
        .btn-primary {
            background-color: var(--primary-blue);
            color: var(--white);
        }
        
        .btn-primary:hover {
            background-color: var(--dark-blue);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 119, 255, 0.2);
        }
        
        .btn-secondary {
            background-color: var(--light-blue);
            color: var(--primary-blue);
            border: 1px solid var(--primary-blue);
        }
        
        .btn-secondary:hover {
            background-color: var(--primary-blue);
            color: var(--white);
        }
        
        .system-toggle {
            display: flex;
            align-items: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        .toggle-label {
            margin-right: 15px;
            font-weight: 600;
        }
        
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 30px;
        }
        
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background-color: var(--primary-blue);
        }
        
        input:checked + .slider:before {
            transform: translateX(30px);
        }
        
        .toggle-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            font-size: 0.8rem;
            color: #666;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }
            
            .converter-controls {
                flex-direction: column;
            }
            
            .results-grid {
                grid-template-columns: 1fr;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Unit Converter</h1>
            <p class="header-description">
                Convert between different units of measurement instantly. Supports length, weight, temperature, volume, area, and more.
            </p>
        </header>
        
        <div class="tool-card">
            <div class="converter-controls">
                <div class="control-group">
                    <label for="category">Category</label>
                    <select id="category" class="select-field">
                        <option value="length">Length</option>
                        <option value="weight">Weight</option>
                        <option value="temperature">Temperature</option>
                        <option value="volume">Volume</option>
                        <option value="area">Area</option>
                        <option value="speed">Speed</option>
                        <option value="time">Time</option>
                    </select>
                </div>
                
                <div class="control-group">
                    <label for="from-unit">From Unit</label>
                    <select id="from-unit" class="select-field"></select>
                </div>
                
                <div class="control-group">
                    <label for="to-unit">To Unit</label>
                    <select id="to-unit" class="select-field"></select>
                </div>
                
                <div class="control-group">
                    <label for="input-value">Value</label>
                    <input type="number" id="input-value" class="input-field" placeholder="Enter value" value="1">
                </div>
            </div>
            
            <div class="system-toggle">
                <span class="toggle-label">Unit System:</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="system-toggle">
                    <span class="slider"></span>
                </label>
                <div class="toggle-labels">
                    <span>Metric</span>
                    <span>Imperial</span>
                </div>
            </div>
            
            <div class="results-container">
                <h3 style="color: var(--primary-blue);">Conversion Results</h3>
                <div class="results-grid" id="results-grid"></div>
            </div>
            
            <div class="btn-group">
                <button class="btn btn-primary" id="convert-btn">Convert</button>
                <button class="btn btn-secondary" id="clear-btn">Clear</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // DOM Elements
            const categorySelect = document.getElementById('category');
            const fromUnitSelect = document.getElementById('from-unit');
            const toUnitSelect = document.getElementById('to-unit');
            const inputValue = document.getElementById('input-value');
            const resultsGrid = document.getElementById('results-grid');
            const convertBtn = document.getElementById('convert-btn');
            const clearBtn = document.getElementById('clear-btn');
            const systemToggle = document.getElementById('system-toggle');
            
            // Unit definitions
            const units = {
                length: {
                    metric: [
                        { name: 'Millimeters', value: 'mm', factor: 0.001 },
                        { name: 'Centimeters', value: 'cm', factor: 0.01 },
                        { name: 'Meters', value: 'm', factor: 1 },
                        { name: 'Kilometers', value: 'km', factor: 1000 }
                    ],
                    imperial: [
                        { name: 'Inches', value: 'in', factor: 0.0254 },
                        { name: 'Feet', value: 'ft', factor: 0.3048 },
                        { name: 'Yards', value: 'yd', factor: 0.9144 },
                        { name: 'Miles', value: 'mi', factor: 1609.344 }
                    ]
                },
                weight: {
                    metric: [
                        { name: 'Milligrams', value: 'mg', factor: 0.000001 },
                        { name: 'Grams', value: 'g', factor: 0.001 },
                        { name: 'Kilograms', value: 'kg', factor: 1 },
                        { name: 'Metric Tons', value: 't', factor: 1000 }
                    ],
                    imperial: [
                        { name: 'Ounces', value: 'oz', factor: 0.0283495 },
                        { name: 'Pounds', value: 'lb', factor: 0.453592 },
                        { name: 'US Tons', value: 'ton', factor: 907.185 }
                    ]
                },
                temperature: {
                    metric: [
                        { name: 'Celsius', value: '°C' }
                    ],
                    imperial: [
                        { name: 'Fahrenheit', value: '°F' }
                    ],
                    special: [
                        { name: 'Kelvin', value: 'K' }
                    ]
                },
                volume: {
                    metric: [
                        { name: 'Milliliters', value: 'mL', factor: 0.001 },
                        { name: 'Liters', value: 'L', factor: 1 },
                        { name: 'Cubic Meters', value: 'm³', factor: 1000 }
                    ],
                    imperial: [
                        { name: 'Fluid Ounces', value: 'fl oz', factor: 0.0295735 },
                        { name: 'Cups', value: 'cup', factor: 0.236588 },
                        { name: 'Pints', value: 'pt', factor: 0.473176 },
                        { name: 'Quarts', value: 'qt', factor: 0.946353 },
                        { name: 'Gallons', value: 'gal', factor: 3.78541 }
                    ]
                },
                area: {
                    metric: [
                        { name: 'Square Millimeters', value: 'mm²', factor: 0.000001 },
                        { name: 'Square Centimeters', value: 'cm²', factor: 0.0001 },
                        { name: 'Square Meters', value: 'm²', factor: 1 },
                        { name: 'Hectares', value: 'ha', factor: 10000 },
                        { name: 'Square Kilometers', value: 'km²', factor: 1000000 }
                    ],
                    imperial: [
                        { name: 'Square Inches', value: 'in²', factor: 0.00064516 },
                        { name: 'Square Feet', value: 'ft²', factor: 0.092903 },
                        { name: 'Square Yards', value: 'yd²', factor: 0.836127 },
                        { name: 'Acres', value: 'ac', factor: 4046.86 },
                        { name: 'Square Miles', value: 'mi²', factor: 2589988.11 }
                    ]
                },
                speed: {
                    metric: [
                        { name: 'Meters per Second', value: 'm/s', factor: 1 },
                        { name: 'Kilometers per Hour', value: 'km/h', factor: 0.277778 }
                    ],
                    imperial: [
                        { name: 'Feet per Second', value: 'ft/s', factor: 0.3048 },
                        { name: 'Miles per Hour', value: 'mph', factor: 0.44704 },
                        { name: 'Knots', value: 'kn', factor: 0.514444 }
                    ]
                },
                time: {
                    metric: [],
                    imperial: [],
                    special: [
                        { name: 'Milliseconds', value: 'ms', factor: 0.001 },
                        { name: 'Seconds', value: 's', factor: 1 },
                        { name: 'Minutes', value: 'min', factor: 60 },
                        { name: 'Hours', value: 'hr', factor: 3600 },
                        { name: 'Days', value: 'd', factor: 86400 },
                        { name: 'Weeks', value: 'wk', factor: 604800 },
                        { name: 'Years', value: 'yr', factor: 31536000 }
                    ]
                }
            };
            
            // Initialize the unit selectors
            function initializeUnitSelectors() {
                const category = categorySelect.value;
                const isImperial = systemToggle.checked;
                const categoryUnits = units[category];
                
                // Clear existing options
                fromUnitSelect.innerHTML = '';
                toUnitSelect.innerHTML = '';
                
                // Add metric units
                if (categoryUnits.metric && categoryUnits.metric.length > 0) {
                    categoryUnits.metric.forEach(unit => {
                        const option = document.createElement('option');
                        option.value = unit.value;
                        option.textContent = `${unit.name} (${unit.value})`;
                        fromUnitSelect.appendChild(option);
                        
                        // Clone for to-unit selector
                        const option2 = option.cloneNode(true);
                        toUnitSelect.appendChild(option2);
                    });
                }
                
                // Add imperial units if toggled
                if (isImperial && categoryUnits.imperial && categoryUnits.imperial.length > 0) {
                    categoryUnits.imperial.forEach(unit => {
                        const option = document.createElement('option');
                        option.value = unit.value;
                        option.textContent = `${unit.name} (${unit.value})`;
                        fromUnitSelect.appendChild(option);
                        
                        // Clone for to-unit selector
                        const option2 = option.cloneNode(true);
                        toUnitSelect.appendChild(option2);
                    });
                }
                
                // Add special units (like Kelvin for temperature)
                if (categoryUnits.special && categoryUnits.special.length > 0) {
                    categoryUnits.special.forEach(unit => {
                        const option = document.createElement('option');
                        option.value = unit.value;
                        option.textContent = `${unit.name} (${unit.value})`;
                        fromUnitSelect.appendChild(option);
                        
                        // Clone for to-unit selector
                        const option2 = option.cloneNode(true);
                        toUnitSelect.appendChild(option2);
                    });
                }
                
                // Set default to-unit to be different from from-unit
                if (toUnitSelect.options.length > 1) {
                    toUnitSelect.selectedIndex = 1;
                }
            }
            
            // Convert temperature units
            function convertTemperature(value, fromUnit, toUnit) {
                let celsius;
                
                // Convert to Celsius first
                switch (fromUnit) {
                    case '°C':
                        celsius = value;
                        break;
                    case '°F':
                        celsius = (value - 32) * 5/9;
                        break;
                    case 'K':
                        celsius = value - 273.15;
                        break;
                    default:
                        return value;
                }
                
                // Convert from Celsius to target unit
                switch (toUnit) {
                    case '°C':
                        return celsius;
                    case '°F':
                        return (celsius * 9/5) + 32;
                    case 'K':
                        return celsius + 273.15;
                    default:
                        return value;
                }
            }
            
            // Perform the conversion
            function performConversion() {
                const value = parseFloat(inputValue.value);
                if (isNaN(value)) {
                    resultsGrid.innerHTML = '<div class="result-card">Please enter a valid number</div>';
                    return;
                }
                
                const category = categorySelect.value;
                const fromUnit = fromUnitSelect.value;
                const toUnit = toUnitSelect.value;
                
                // Special case for temperature
                if (category === 'temperature') {
                    const convertedValue = convertTemperature(value, fromUnit, toUnit);
                    displayResult(value, fromUnit, convertedValue, toUnit);
                    return;
                }
                
                // Find the units in our definitions
                let fromUnitData, toUnitData;
                
                // Search in metric units
                if (units[category].metric) {
                    fromUnitData = units[category].metric.find(u => u.value === fromUnit);
                    toUnitData = units[category].metric.find(u => u.value === toUnit);
                }
                
                // If not found in metric, search in imperial
                if (!fromUnitData && units[category].imperial) {
                    fromUnitData = units[category].imperial.find(u => u.value === fromUnit);
                }
                if (!toUnitData && units[category].imperial) {
                    toUnitData = units[category].imperial.find(u => u.value === toUnit);
                }
                
                // If still not found, search in special units
                if (!fromUnitData && units[category].special) {
                    fromUnitData = units[category].special.find(u => u.value === fromUnit);
                }
                if (!toUnitData && units[category].special) {
                    toUnitData = units[category].special.find(u => u.value === toUnit);
                }
                
                if (!fromUnitData || !toUnitData) {
                    resultsGrid.innerHTML = '<div class="result-card">Conversion not supported between these units</div>';
                    return;
                }
                
                // Convert to base unit first, then to target unit
                const baseValue = value * fromUnitData.factor;
                const convertedValue = baseValue / toUnitData.factor;
                
                displayResult(value, fromUnit, convertedValue, toUnit);
            }
            
            // Display the conversion results
            function displayResult(originalValue, originalUnit, convertedValue, targetUnit) {
                resultsGrid.innerHTML = '';
                
                // Main conversion result
                const mainResult = document.createElement('div');
                mainResult.className = 'result-card';
                mainResult.innerHTML = `
                    <div class="result-value">${originalValue} ${originalUnit} = ${convertedValue.toFixed(6)} ${targetUnit}</div>
                    <div class="result-unit">Direct conversion</div>
                `;
                resultsGrid.appendChild(mainResult);
                
                // Get all available units for this category
                const category = categorySelect.value;
                const allUnits = [];
                
                if (units[category].metric) {
                    allUnits.push(...units[category].metric);
                }
                
                if (systemToggle.checked && units[category].imperial) {
                    allUnits.push(...units[category].imperial);
                }
                
                if (units[category].special) {
                    allUnits.push(...units[category].special);
                }
                
                // Special case for temperature
                if (category === 'temperature') {
                    allUnits.forEach(unit => {
                        if (unit.value !== targetUnit) {
                            const value = convertTemperature(originalValue, originalUnit, unit.value);
                            const resultCard = document.createElement('div');
                            resultCard.className = 'result-card';
                            resultCard.innerHTML = `
                                <div class="result-value">${value.toFixed(2)} ${unit.value}</div>
                                <div class="result-unit">${originalValue} ${originalUnit}</div>
                            `;
                            resultsGrid.appendChild(resultCard);
                        }
                    });
                    return;
                }
                
                // For other categories
                const fromUnitData = allUnits.find(u => u.value === originalUnit);
                if (!fromUnitData) return;
                
                const baseValue = originalValue * fromUnitData.factor;
                
                allUnits.forEach(unit => {
                    if (unit.value !== targetUnit) {
                        const value = baseValue / unit.factor;
                        const resultCard = document.createElement('div');
                        resultCard.className = 'result-card';
                        resultCard.innerHTML = `
                            <div class="result-value">${value.toFixed(6)} ${unit.value}</div>
                            <div class="result-unit">${originalValue} ${originalUnit}</div>
                        `;
                        resultsGrid.appendChild(resultCard);
                    }
                });
            }
            
            // Clear all inputs and results
            function clearAll() {
                inputValue.value = '1';
                resultsGrid.innerHTML = '';
                initializeUnitSelectors();
            }
            
            // Event listeners
            categorySelect.addEventListener('change', initializeUnitSelectors);
            systemToggle.addEventListener('change', initializeUnitSelectors);
            convertBtn.addEventListener('click', performConversion);
            clearBtn.addEventListener('click', clearAll);
            
            // Also convert when any input changes
            inputValue.addEventListener('input', performConversion);
            fromUnitSelect.addEventListener('change', performConversion);
            toUnitSelect.addEventListener('change', performConversion);
            
            // Initialize on page load
            initializeUnitSelectors();
            performConversion();
        });
    </script>
</body>
</html>
